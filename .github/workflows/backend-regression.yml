name: Backend Regression

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/backend-regression.yml'
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/backend-regression.yml'

jobs:
  backend-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/structureclaw

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Run Backend Regression
        run: make backend-regression
